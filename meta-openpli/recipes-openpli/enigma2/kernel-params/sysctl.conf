# VU+ 4K memory tuning
#
# This file contains memory management settings specifically tuned
# for VU+ 4K hardware (BCM7278 SoC) with constrained DMA zone.
#
# It intentionally overrides only the relevant vm.* parameters
# without touching the OE-Core /etc/sysctl.conf baseline.
#
# Background:
# The DMA zone on VU+ Duo 4K has only ~106 MB of managed memory.
# The kernel default min_free_kbytes (~1308 kB) is too low for this
# hardware -- the system reaches critical fragmentation before the
# kernel has time to reclaim. 4096 kB provides a proportionate
# safety margin (3.8% of DMA budget) without excessive reservation.
#
# dirty_* settings reduce unnecessary disk write pressure and
# avoid additional DMA zone load from writeback activity.
 
# Memory reclaim threshold -- trigger reclaim before OOM
# Default kernel value (~1308 kB) is too low for this hardware
# 8192 kB (Debian default) is too high and wastes scarce DMA memory
# 4096 kB is a proportionate value for 106 MB DMA budget
vm.min_free_kbytes = 4096
 
# Reduce writeback frequency to lower DMA pressure from dirty pages
vm.dirty_writeback_centisecs = 300
vm.dirty_background_ratio = 1
vm.dirty_ratio = 60
